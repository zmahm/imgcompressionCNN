# Local development docker-compose
# For production deploy, use: deploy/update-imgcompression.py
services:
  imgcomp-backend:
    build: ./backend
    container_name: imgcomp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  imgcomp-frontend:
    build: ./frontend
    container_name: imgcomp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - imgcomp-backend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
